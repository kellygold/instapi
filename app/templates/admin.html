<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="InstaPi"/>
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icon-180.png"/>
    <link rel="manifest" href="/static/manifest.json"/>
    <title>InstaPi Admin</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <div class="container">
        {% include 'admin/_header.html' %}
        {% include 'admin/_photos.html' %}
        {% include 'admin/_sync.html' %}
        {% include 'admin/_settings.html' %}
        {% include 'admin/_controls.html' %}

        <!-- Footer -->
        <div class="footer">
            <a href="/">← Back to Frame</a>
        </div>
    </div>

    {% include 'admin/_modals.html' %}

    <script>
        window.INSTAPI_CONFIG = {
            syncRole: '{{ sync_role }}',
            syncLabel: '{{ sync_label }}',
            displayMode: '{{ display_mode }}',
            uploadToken: '{{ upload_token }}',
            storage: {
                photos_mb: {{ storage.photos_mb }},
                used_gb: {{ storage.used_gb }},
                free_gb: {{ storage.free_gb }},
                total_gb: {{ storage.total_gb }}
            }
        };
    </script>
    <script src="/static/js/admin.js"></script>
</body>
</html>
