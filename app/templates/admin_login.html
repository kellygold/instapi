<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="InstaPi">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icon-180.png">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/favicon.ico">
    <title>Admin Login — InstaPi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #0f0b1e;
            --bg-card: rgba(255,255,255,0.04);
            --accent: #ff6b6b;
            --accent-mid: #e85d5d;
            --accent-dark: #c0392b;
            --text-primary: #f0f0ff;
            --text-secondary: #fca5a5;
            --text-muted: rgba(255,255,255,0.45);
            --border-subtle: rgba(255, 107, 107, 0.12);
            --radius: 20px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 140%;
            height: 140%;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(255, 107, 107, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(167, 139, 250, 0.04) 0%, transparent 50%);
            animation: ambientShift 20s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes ambientShift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-5%, 3%) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        .header {
            text-align: center;
            animation: fadeUp 0.6s ease both;
        }

        .logo {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            margin-bottom: 20px;
            box-shadow: 0 0 40px rgba(255, 107, 107, 0.2);
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
            max-width: 280px;
            margin: 0 auto;
        }

        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: fadeUp 0.6s ease 0.15s both;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-card);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-group input:focus {
            border-color: rgba(255, 107, 107, 0.4);
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.2);
        }

        .btn-signin {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent-mid), var(--accent-dark));
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-signin:hover, .btn-signin:active {
            transform: scale(1.01);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fca5a5;
            font-size: 0.9rem;
            text-align: center;
        }

        .footer {
            text-align: center;
            animation: fadeUp 0.6s ease 0.3s both;
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: var(--text-secondary);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/static/instapi_logo_full.jpg" alt="InstaPi" class="logo">
            <h1>Admin Login</h1>
            <p>Enter your Pi's system password to continue</p>
        </div>

        <form class="login-form" method="POST" action="/admin/login">
            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="System password" autofocus required>
            </div>

            <button type="submit" class="btn-signin">Sign In</button>
        </form>

        <div class="footer">
            <a href="/upload">Looking to add photos? Use the upload link instead</a>
        </div>
    </div>
</body>
</html>
